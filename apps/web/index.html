<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <title>BarberPro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    
  </head>
  <body>
    <div id="root"></div>
    <!-- Aplica o tema salvo ANTES do React montar — evita o flash de
         tema errado no carregamento. Escuro é o padrão. -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('barberpro-theme') === 'light' ? 'light' : 'dark'
      } catch (e) { /* localStorage bloqueado — fica no escuro padrão */ }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
